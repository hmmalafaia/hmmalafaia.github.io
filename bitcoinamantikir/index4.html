    <title>A Rota do Bitcoin - Guia Completo</title>
    <style>
        :root { --bitcoin: #f7931a; }
        html { scroll-behavior: smooth; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        
        /* Botão PDF Desktop */
        .btn-pdf { background: #d9534f; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-pdf:hover { background: #c9302c; }
        
        /* Estilos da Busca */
        .search-container { margin-bottom: 20px; display: flex; justify-content: center; }
        .search-input { width: 100%; max-width: 600px; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; font-size: 1em; outline: none; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-input:focus { border-color: var(--bitcoin); box-shadow: 0 0 8px rgba(247,147,26,0.3); }
        
        /* Estilos dos Filtros */
        .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center; }
        button.filter-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--bitcoin); background: white; cursor: pointer; transition: 0.2s; }
        button.filter-btn.active, button.filter-btn:hover { background: var(--bitcoin); color: white; }
        
        /* Estilos do Grid e Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; scroll-margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid var(--bitcoin); }
        .card a { color: var(--bitcoin); text-decoration: none; font-weight: bold; }
        .card a:hover { text-decoration: underline; }
        .tag { font-size: 0.75em; color: var(--bitcoin); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        h3 { margin: 0 0 10px 0; color: #333; }
        p { font-size: 0.9em; margin: 5px 0; color: #555; }
        
        /* Ajustes específicos para Celulares (Botão Flutuante) */
        @media (max-width: 768px) {
            .btn-pdf {
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 9999;
                padding: 12px 18px;
                border-radius: 50px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                font-size: 15px;
            }
            .pdf-text { display: none; /* Esconde o texto longo no celular */ }
            .btn-pdf::after { content: " PDF"; /* Adiciona um texto curto */ }
        }

        /* Oculta controles na impressão do PDF */
        @media print {
            .controls, .filters, .search-container, .btn-pdf { display: none !important; }
            body { background: white; padding: 0; }
            .grid { display: block; }
            .card { break-inside: avoid; border: 1px solid #ccc; margin-bottom: 10px; box-shadow: none; }
        }
    </style>
</head>

    function formatInsta(instaRaw) {
        if (!instaRaw) return 'Não informado';
        
        let cleaned = instaRaw.trim();
        let lower = cleaned.toLowerCase();
        
        const invalidos = ['não', 'nao', 'não tem', 'nao tem', 'não possui', 'não informado', 'instagram', 'nenhum', 'em desenvolvimento', 'vou pedir', 'ainda não tem', 'instagram, facebook'];
        if (invalidos.includes(lower)) {
            return cleaned; 
        }
        
        if (lower.startsWith('http') || lower.startsWith('www') || lower.includes('.com') || lower.includes('.cc')) {
            let url = lower.startsWith('http') ? cleaned : 'https://' + cleaned;
            return `<a href="${url}" target="_blank">Acessar Site/Link</a>`;
        }
        
        let username = cleaned.replace(/^@+/, ''); 
        return `<a href="https://www.instagram.com/${username}" target="_blank">@${username}</a>`;
    }

    const grid = document.getElementById('grid');
    const filterDiv = document.getElementById('filters');
    const searchInput = document.getElementById('searchInput');
    
    let activeCategories = new Set(['Todos']);
    let searchQuery = '';

    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        render();
    });

    function render() {
        grid.innerHTML = '';
        
        const filtered = estabelecimentos.filter(item => {
            const matchCategory = activeCategories.has('Todos') || activeCategories.has(item.categoria);
            
            const searchStr = searchQuery;
            const matchSearch = searchStr === '' || 
                                (item.nome && item.nome.toLowerCase().includes(searchStr)) || 
                                (item.categoria && item.categoria.toLowerCase().includes(searchStr)) || 
                                (item.end && item.end.toLowerCase().includes(searchStr)) || 
                                (item.insta && item.insta.toLowerCase().includes(searchStr));
                                
            return matchCategory && matchSearch;
        });

        grid.innerHTML = filtered.map(item => `
            <div class="card">
                <div class="tag">${item.categoria}</div>
                <h3>${item.nome}</h3>
                <p>📍 ${item.end}</p>
                <p>📸 ${formatInsta(item.insta)}</p>
            </div>
        `).join('');
    }

    const cats = ['Todos', ...new Set(estabelecimentos.map(i => i.categoria))];
    
    cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        if (cat === 'Todos') btn.classList.add('active');
        btn.innerText = cat;
        
        btn.onclick = (e) => {
            if (cat === 'Todos') {
                activeCategories.clear();
                activeCategories.add('Todos');
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                activeCategories.delete('Todos');
                const btnTodos = filterDiv.querySelector('.filter-btn');
                if (btnTodos) btnTodos.classList.remove('active');

                if (activeCategories.has(cat)) {
                    activeCategories.delete(cat);
                    btn.classList.remove('active');
                } else {
                    activeCategories.add(cat);
                    btn.classList.add('active');
                }

                if (activeCategories.size === 0) {
                    activeCategories.add('Todos');
                    if (btnTodos) btnTodos.classList.add('active');
                }
            }
            render();

            if (window.innerWidth <= 768) {
                document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };
        filterDiv.appendChild(btn);
    });

    render();
</script>
